server:
  port: 8086
spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
  cloud:
    aws:
      region: us-east-1
      sns:
        topic-arn: arn:aws:sns:us-east-1:000000000000:ecommerce-notifications
        endpoint: http://localhost:4566
      credentials:
        access-key: test
        secret-key: test
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8888/eureka
management:
  tracing:
    enabled: true
    exporter:
      otlp:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    org.springframework.kafka: INFO
    com.p6spy: DEBUG
  pattern:
    level: "%5p [${spring.application.name},traceId=%X{traceId},spanId=%X{spanId}]"
monitoring:
  prometheus:
    api-key: prometheus-secret