server:
  port: 8080
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:p6spy:mysql://user-mysql:3306/user_db
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: redis
      port: 6379
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
jwt:
  secret: mysecretkeymysecretkeymysecretkey
  expiration: 3600000
management:
  tracing:
    enabled: true
    exporter:
      otlp:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,jaeger,otlp
  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
logging:
  level:
    com.p6spy: debug
  pattern:
    level: "%5p [${spring.application.name},traceId=%X{traceId},spanId=%X{spanId}]"
monitoring:
  prometheus:
    api-key: prometheus-secret