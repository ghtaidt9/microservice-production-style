server:
  port: 8080
spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.value.default.type: com.taidt9.PaymentResultEvent
      spring.json.trusted.packages: "com.taidt9"
  cloud:
    aws:
      sqs:
        endpoint: http://localhost:4566
      region:
        static: us-east-1
      queue:
        paymentRequests: ${SQS_PAYMENT_QUEUE:payment-service-requests}
        paymentDlq: ${SQS_PAYMENT_DLQ:payment-service-requests-dlq}
      credentials:
        access-key: test
        secret-key: test
  datasource:
    url: jdbc:p6spy:mysql://order-mysql:3306/order_db
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
management:
  tracing:
    enabled: true
    exporter:
      otlp:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    org.springframework.kafka: INFO
    com.p6spy: DEBUG
  pattern:
    level: "%5p [${spring.application.name},traceId=%X{traceId},spanId=%X{spanId}]"
monitoring:
  prometheus:
    api-key: prometheus-secret