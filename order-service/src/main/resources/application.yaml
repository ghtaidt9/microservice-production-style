server:
  port: 8083
spring:
  application:
    name: order-service
  Kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/order_db
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8888/eureka
management:
  tracing:
    enabled: true
    exporter:
      otlp:
        enabled: true
        endpoint: http://collector:4318/v1/traces
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    com.p6spy: DEBUG
  pattern:
    level: "%5p [${spring.application.name},traceId=%X{traceId},spanId=%X{spanId}]"
monitoring:
  prometheus:
    api-key: prometheus-secret