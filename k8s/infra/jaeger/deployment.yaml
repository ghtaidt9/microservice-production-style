apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6831
          protocol: UDP
          name: jaeger-compact
        - containerPort: 6832
          protocol: UDP
          name: jaeger-binary
        - containerPort: 5775
          protocol: UDP
          name: jaeger-zipkin
        - containerPort: 5778
          protocol: TCP
          name: jaeger-serve
        - containerPort: 16686
          protocol: TCP
          name: jaeger-ui
        - containerPort: 4317
          protocol: TCP
          name: otel-grpc
        - containerPort: 4318
          protocol: TCP
          name: otel-http
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
  - name: jaeger-compact
    port: 6831
    protocol: UDP
  - name: jaeger-binary
    port: 6832
    protocol: UDP
  - name: jaeger-zipkin
    port: 5775
    protocol: UDP
  - name: jaeger-serve
    port: 5778
    protocol: TCP
  - name: jaeger-ui
    port: 16686
    protocol: TCP
  - name: otel-grpc
    port: 4317
    protocol: TCP
  - name: otel-http
    port: 4318
    protocol: TCP
