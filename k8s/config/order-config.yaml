apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
data:
  DB_URL: jdbc:p6spy:mysql://order-mysql:3306/order_db
  EUREKA_URL: http://discovery-service:8761/eureka/
  KAFKA_BOOTSTRAP: kafka:9092
  AWS_SQS_ENDPOINT: http://localstack:4566
