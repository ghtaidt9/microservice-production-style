name: Deploy API Gateway

on:
  push:
    branches: [ "main" ]
    paths:
      - "api-gateway/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build app
        run: |
          cd api-gateway
          ./gradlew clean build

      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/api-gateway:latest api-gateway

      - name: Push Image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/api-gateway:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig \
          --name ${{ secrets.EKS_CLUSTER_NAME }} \
          --region ${{ secrets.AWS_REGION }}

      - name: Deploy
        run: |
          kubectl set image deployment/api-gateway \
          api-gateway=ghcr.io/${{ secrets.GHCR_USERNAME }}/api-gateway:latest

          kubectl rollout status deployment/api-gateway