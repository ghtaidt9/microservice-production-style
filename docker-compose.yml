# ========================
# NETWORK
# ========================
networks:
  taidt9-network:

# ========================
# VOLUMES
# ========================
volumes:
  mysql_user_data:
  mysql_product_data:
  mysql_order_data:
  mysql_analytics_data:
  mysql_inventory_data:
  redis_data:
  kafka_data:
  nexus_data:

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - taidt9-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  common-events-publisher:
    image: gradle:8.5-jdk17
    container_name: common-events-publisher
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      - nexus
    environment:
      - NEXUS_USERNAME=${NEXUS_USERNAME}
      - NEXUS_PASSWORD=${NEXUS_PASSWORD}
      - ORG_GRADLE_PROJECT_nexusUsername=${NEXUS_USERNAME}
      - ORG_GRADLE_PROJECT_nexusPassword=${NEXUS_PASSWORD}
      - ORG_GRADLE_PROJECT_nexusRepoUrl=http://nexus:8081/repository/maven-snapshots/
    networks:
      - taidt9-network
    command: sh -c "until curl -sSf http://nexus:8081/service/rest/v1/status; do echo 'waiting for nexus'; sleep 5; done; gradle -p common-events publish"
    restart: "no"

  # ========================
  # ZOOKEEPER
  # ========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - taidt9-network

  # ========================
  # KAFKA
  # ========================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - taidt9-network

  # ========================
  # REDIS
  # ========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taidt9-network

  # ========================
  # MYSQL SERVICES
  # ========================
  user-mysql:
    image: mysql:8
    container_name: user-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    volumes:
      - mysql_user_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - taidt9-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  product-mysql:
    image: mysql:8
    container_name: product-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
    volumes:
      - mysql_product_data:/var/lib/mysql
    ports:
      - "3309:3306"
    networks:
      - taidt9-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-mysql:
    image: mysql:8
    container_name: order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    volumes:
      - mysql_order_data:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - taidt9-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  analytics-mysql:
    image: mysql:8
    container_name: analytics-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: analytics_db
    volumes:
      - mysql_analytics_data:/var/lib/mysql
    ports:
      - "3311:3306"
    networks:
      - taidt9-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-mysql:
    image: mysql:8
    container_name: inventory-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    volumes:
      - mysql_inventory_data:/var/lib/mysql
    ports:
      - "3312:3306"
    networks:
      - taidt9-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ========================
  # DISCOVERY
  # ========================
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - taidt9-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========================
  # API GATEWAY
  # ========================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    environment:
      - JAVA_TOOL_OPTIONS=-Dmanagement.tracing.exporter.otlp.protocol=grpc -Dmanagement.tracing.exporter.otlp.endpoint=http://jaeger:4317
      # - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - taidt9-network
    restart: always

